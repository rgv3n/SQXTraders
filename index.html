<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>SQX Traders — The Premier Trading Events Platform</title>
    <meta name="description" content="Discover and register for exclusive trading events, conferences and networking meetups. SQX Traders connects the global trading community." />
    <meta name="keywords" content="trading events, trading conferences, forex events, financial markets, trading community, networking, SQX" />
    <meta name="author" content="SQX Traders" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#D4A853" />

    <!-- Canonical -->
    <link rel="canonical" href="%VITE_APP_URL%" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SQX Traders" />
    <meta property="og:title" content="SQX Traders — The Premier Trading Events Platform" />
    <meta property="og:description" content="Discover and register for exclusive trading events, conferences and networking meetups. SQX Traders connects the global trading community." />
    <meta property="og:image" content="%VITE_APP_URL%/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SQX Traders — Trading Events Platform" />
    <meta property="og:url" content="%VITE_APP_URL%" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SQXTraders" />
    <meta name="twitter:title" content="SQX Traders — The Premier Trading Events Platform" />
    <meta name="twitter:description" content="Discover and register for exclusive trading events, conferences and networking meetups. SQX Traders connects the global trading community." />
    <meta name="twitter:image" content="%VITE_APP_URL%/og-default.png" />

    <!-- JSON-LD: Organization (global) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SQX Traders",
      "description": "The premier event platform for the global trading community.",
      "url": "%VITE_APP_URL%",
      "logo": {
        "@type": "ImageObject",
        "url": "%VITE_APP_URL%/favicon.svg"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite (enables Sitelinks Search Box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SQX Traders",
      "url": "%VITE_APP_URL%",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "%VITE_APP_URL%/events?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
